# node-modules linker is required: the @midnight-ntwrk wasm/native packages and
# the compact compiler's COMPACT_PATH=../../node_modules imports need a real
# hoisted node_modules tree (PnP would break both).
nodeLinker: node-modules

enableTelemetry: false

# Native/wasm deps (esbuild, classic-level, @parcel/watcher, msgpackr-extract)
# rely on their install scripts; keep them enabled even if a machine-global
# yarnrc turns them off.
enableScripts: true

# First-party packages published from the sig-net protocol repo: exempt from
# yarn's minimum-release-age quarantine (npmMinimalAgeGate) so a fresh publish
# is installable immediately — locally and in CI.
npmPreapprovedPackages:
  - "@sig-net/*"
